<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DocMind — RAG Chatbot</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --surface: #13161e;
    --surface2: #1a1d27;
    --border: #232636;
    --accent: #6c63ff;
    --accent-dim: rgba(108,99,255,0.15);
    --accent-glow: rgba(108,99,255,0.4);
    --text: #e8eaf0;
    --text-muted: #7b80a0;
    --warn: #f59e0b;
    --error: #ef4444;
    --success: #22c55e;
    --radius: 14px;
    --radius-sm: 8px;
  }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  h1, h2, h3 { font-family: 'Syne', sans-serif; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  /* ── Layout ── */
  .app {
    display: grid;
    grid-template-columns: 340px 1fr;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Left Panel ── */
  .left-panel {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 28px 24px;
    gap: 24px;
    overflow-y: auto;
  }

  .brand h1 {
    font-size: 2rem;
    font-weight: 800;
    background: linear-gradient(135deg, #fff 30%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    letter-spacing: -0.5px;
  }
  .brand h1 span { color: var(--accent); }
  .brand p {
    color: var(--text-muted);
    font-size: 13px;
    margin-top: 4px;
  }

  /* Drop zone */
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 32px 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: var(--accent-dim);
  }
  .drop-zone input { display: none; }
  .drop-zone .dz-icon {
    font-size: 2.2rem;
    margin-bottom: 10px;
    display: block;
  }
  .drop-zone .dz-label {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .drop-zone .dz-label strong { color: var(--accent); }

  /* Status badge */
  .status-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-muted);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .status-dot.uploading { background: var(--warn); animation: pulse 1s infinite; }
  .status-dot.ready { background: var(--success); }
  .status-text { font-size: 13px; color: var(--text-muted); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* File info */
  .file-info {
    display: none;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 13px;
    gap: 10px;
    align-items: center;
  }
  .file-info.show { display: flex; }
  .file-info .fi-icon { font-size: 1.4rem; flex-shrink: 0; }
  .file-info .fi-name {
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 160px;
  }
  .chunk-badge {
    margin-left: auto;
    background: var(--accent-dim);
    color: var(--accent);
    border: 1px solid var(--accent-glow);
    border-radius: 99px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }

  /* Slider */
  .slider-section label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .slider-section label span { color: var(--accent); font-size: 14px; }
  .slider-labels {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 6px;
  }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 8px var(--accent-glow);
    transition: box-shadow 0.2s;
  }
  input[type="range"]::-webkit-slider-thumb:hover {
    box-shadow: 0 0 16px var(--accent-glow);
  }

  /* Clear btn */
  .btn-clear {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: var(--radius-sm);
    padding: 10px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
    width: 100%;
    margin-top: auto;
  }
  .btn-clear:hover:not(:disabled) {
    border-color: var(--error);
    color: var(--error);
    background: rgba(239,68,68,0.08);
  }
  .btn-clear:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Right Panel ── */
  .right-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Empty state */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text-muted);
    text-align: center;
    padding: 40px;
  }
  .empty-state .es-icon { font-size: 3rem; opacity: 0.4; }
  .empty-state p { font-size: 14px; max-width: 260px; line-height: 1.6; }

  /* Messages */
  .msg {
    display: flex;
    flex-direction: column;
    max-width: 75%;
    animation: fadeUp 0.2s ease;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.assistant { align-self: flex-start; align-items: flex-start; }

  .bubble {
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.65;
    word-break: break-word;
  }
  .msg.user .bubble {
    background: var(--accent);
    color: #fff;
    border-bottom-right-radius: 4px;
    box-shadow: 0 4px 20px rgba(108,99,255,0.3);
  }
  .msg.assistant .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }
  .msg.assistant .bubble.not-found {
    border-color: var(--warn);
    color: var(--warn);
  }

  /* Typing indicator */
  .typing-indicator {
    display: inline-flex;
    gap: 4px;
    align-items: center;
    padding: 4px 0;
  }
  .typing-indicator span {
    width: 6px; height: 6px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

  /* Input area */
  .input-area {
    border-top: 1px solid var(--border);
    padding: 16px 32px;
    background: var(--surface);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    position: relative;
  }
  .input-wrap {
    flex: 1;
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  #chat-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 12px 16px;
    resize: none;
    outline: none;
    line-height: 1.5;
    max-height: 120px;
    overflow-y: auto;
    transition: border-color 0.2s;
  }
  #chat-input::placeholder { color: var(--text-muted); }
  #chat-input:focus { border-color: var(--accent); }
  #chat-input:disabled { opacity: 0.5; cursor: not-allowed; }
  .char-count { font-size: 11px; color: var(--text-muted); text-align: right; }

  .btn-send {
    background: var(--accent);
    border: none;
    border-radius: var(--radius-sm);
    color: #fff;
    cursor: pointer;
    font-size: 1.1rem;
    padding: 12px 16px;
    transition: background 0.2s, box-shadow 0.2s, opacity 0.2s;
    flex-shrink: 0;
    align-self: stretch;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .btn-send:hover:not(:disabled) {
    background: #7c74ff;
    box-shadow: 0 0 16px var(--accent-glow);
  }
  .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Toast */
  #toast-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 9999;
  }
  .toast {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    font-size: 13px;
    max-width: 320px;
    animation: slideIn 0.25s ease;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .toast.error { border-left: 3px solid var(--error); }
  .toast.success { border-left: 3px solid var(--success); }
  .toast.warn { border-left: 3px solid var(--warn); }
  @keyframes slideIn { from{opacity:0;transform:translateX(16px)} to{opacity:1;transform:none} }

  /* Frosted glass */
  .glass {
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  /* Responsive */
  @media (max-width: 768px) {
    .app { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
    .left-panel { border-right: none; border-bottom: 1px solid var(--border); padding: 20px 16px; gap: 16px; }
    .chat-area { padding: 20px 16px; }
    .input-area { padding: 12px 16px; }
    .msg { max-width: 90%; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- Left Panel -->
  <aside class="left-panel glass">
    <div class="brand">
      <h1>Doc<span>Mind</span></h1>
      <p>Ask anything. Grounded in your document.</p>
    </div>

    <!-- Drop Zone -->
    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" accept=".pdf,.docx"/>
      <span class="dz-icon">📄</span>
      <div class="dz-label">
        <strong>Click to upload</strong> or drag & drop<br/>
        PDF or DOCX files
      </div>
    </div>

    <!-- Status -->
    <div class="status-row">
      <div class="status-dot" id="status-dot"></div>
      <span class="status-text" id="status-text">No document uploaded</span>
    </div>

    <!-- File Info -->
    <div class="file-info" id="file-info">
      <span class="fi-icon" id="fi-icon">📄</span>
      <span class="fi-name" id="fi-name"></span>
      <span class="chunk-badge" id="chunk-badge"></span>
    </div>

    <!-- Temperature Slider -->
    <div class="slider-section">
      <label>
        Response Strictness
        <span id="temp-value">0.3</span>
      </label>
      <input type="range" id="temp-slider" min="0" max="1" step="0.1" value="0.3"/>
      <div class="slider-labels">
        <span>Precise</span>
        <span>Creative</span>
      </div>
    </div>

    <!-- Clear Button -->
    <button class="btn-clear" id="btn-clear" disabled>🗑 Clear Document</button>
  </aside>

  <!-- Right Panel -->
  <main class="right-panel">
    <div class="chat-area" id="chat-area">
      <!-- Empty state -->
      <div class="empty-state" id="empty-state">
        <span class="es-icon">💬</span>
        <p>Upload a document to begin asking questions</p>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrap">
        <textarea
          id="chat-input"
          rows="1"
          placeholder="Ask a question about your document..."
          disabled
          maxlength="2000"
        ></textarea>
        <div class="char-count"><span id="char-count">0</span> / 2000</div>
      </div>
      <button class="btn-send" id="btn-send" disabled title="Send">
        ➤
      </button>
    </div>
  </main>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<script>
  // ── State ─────────────────────────────────────────────────────────────────
  let sessionId = null;
  let isStreaming = false;

  // ── Elements ──────────────────────────────────────────────────────────────
  const dropZone   = document.getElementById('drop-zone');
  const fileInput  = document.getElementById('file-input');
  const statusDot  = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');
  const fileInfo   = document.getElementById('file-info');
  const fiIcon     = document.getElementById('fi-icon');
  const fiName     = document.getElementById('fi-name');
  const chunkBadge = document.getElementById('chunk-badge');
  const tempSlider = document.getElementById('temp-slider');
  const tempValue  = document.getElementById('temp-value');
  const btnClear   = document.getElementById('btn-clear');
  const chatArea   = document.getElementById('chat-area');
  const emptyState = document.getElementById('empty-state');
  const chatInput  = document.getElementById('chat-input');
  const charCount  = document.getElementById('char-count');
  const btnSend    = document.getElementById('btn-send');

  // ── Helpers ───────────────────────────────────────────────────────────────
  function setStatus(state, text) {
    statusDot.className = 'status-dot ' + (state || '');
    statusText.textContent = text;
  }

  function showToast(msg, type = 'error') {
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.textContent = msg;
    document.getElementById('toast-container').appendChild(t);
    setTimeout(() => t.remove(), 4000);
  }

  function getFileIcon(name) {
    return name.endsWith('.pdf') ? '📕' : '📘';
  }

  function scrollBottom() {
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function setInputEnabled(enabled) {
    chatInput.disabled = !enabled || isStreaming;
    btnSend.disabled   = !enabled || isStreaming;
  }

  // Auto-resize textarea
  chatInput.addEventListener('input', () => {
    chatInput.style.height = 'auto';
    chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
    charCount.textContent = chatInput.value.length;
  });

  // ── Temperature slider ────────────────────────────────────────────────────
  tempSlider.addEventListener('input', () => {
    tempValue.textContent = parseFloat(tempSlider.value).toFixed(1);
  });

  // ── Drag & Drop ───────────────────────────────────────────────────────────
  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) handleUpload(file);
  });
  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) handleUpload(fileInput.files[0]);
  });

  // ── Upload ────────────────────────────────────────────────────────────────
  async function handleUpload(file) {
    const ext = file.name.split('.').pop().toLowerCase();
    if (!['pdf', 'docx'].includes(ext)) {
      showToast('Unsupported file type. Please upload a PDF or DOCX.', 'error');
      return;
    }

    setStatus('uploading', 'Uploading and indexing…');
    fileInfo.classList.remove('show');
    btnClear.disabled = true;
    setInputEnabled(false);

    const form = new FormData();
    form.append('file', file);

    try {
      const res = await fetch('/upload', { method: 'POST', body: form });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || 'Upload failed');
      }
      const data = await res.json();
      sessionId = data.session_id;

      setStatus('ready', 'Document ready');
      fiIcon.textContent = getFileIcon(file.name);
      fiName.textContent = data.filename;
      chunkBadge.textContent = `${data.chunk_count} chunks`;
      fileInfo.classList.add('show');
      btnClear.disabled = false;
      setInputEnabled(true);
      emptyState.style.display = 'none';
      showToast(`Indexed ${data.chunk_count} chunks from "${data.filename}"`, 'success');
    } catch (e) {
      setStatus('', 'Upload failed');
      showToast(e.message, 'error');
    }
  }

  // ── Clear ─────────────────────────────────────────────────────────────────
  btnClear.addEventListener('click', async () => {
    if (!sessionId) return;
    try {
      await fetch(`/session/${sessionId}`, { method: 'DELETE' });
    } catch (_) {}
    resetUI();
  });

  function resetUI() {
    sessionId = null;
    setStatus('', 'No document uploaded');
    fileInfo.classList.remove('show');
    btnClear.disabled = true;
    setInputEnabled(false);
    chatArea.innerHTML = '';
    chatArea.appendChild(emptyState);
    emptyState.style.display = '';
    fileInput.value = '';
  }

  // ── Send message ──────────────────────────────────────────────────────────
  btnSend.addEventListener('click', sendMessage);
  chatInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  async function sendMessage() {
    const query = chatInput.value.trim();
    if (!query || !sessionId || isStreaming) return;

    appendMessage('user', query);
    chatInput.value = '';
    chatInput.style.height = 'auto';
    charCount.textContent = '0';
    isStreaming = true;
    setInputEnabled(false);

    const assistantBubble = appendTypingIndicator();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          session_id: sessionId,
          query,
          temperature: parseFloat(tempSlider.value),
        }),
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || 'Chat request failed');
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let fullText = '';
      assistantBubble.innerHTML = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value, { stream: true });
        const lines = chunk.split('\n');
        for (const line of lines) {
          if (!line.startsWith('data:')) continue;
          const payload = line.startsWith('data: ') ? line.slice(6) : line.slice(5);
          if (payload === '[DONE]') break;
          fullText += payload;
          assistantBubble.textContent = fullText;
          if (fullText.includes('This information is not available in the uploaded document')) {
            assistantBubble.classList.add('not-found');
          }
          scrollBottom();
        }
      }
    } catch (e) {
      assistantBubble.textContent = 'An error occurred: ' + e.message;
      assistantBubble.classList.add('not-found');
      showToast(e.message, 'error');
    } finally {
      isStreaming = false;
      setInputEnabled(true);
      chatInput.focus();
    }
  }

  // ── DOM helpers ───────────────────────────────────────────────────────────
  function appendMessage(role, text) {
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    wrap.appendChild(bubble);
    chatArea.appendChild(wrap);
    scrollBottom();
    return bubble;
  }

  function appendTypingIndicator() {
    const wrap = document.createElement('div');
    wrap.className = 'msg assistant';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
    wrap.appendChild(bubble);
    chatArea.appendChild(wrap);
    scrollBottom();
    return bubble;
  }
</script>
</body>
</html>
